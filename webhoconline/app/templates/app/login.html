{% extends 'app/base_auth.html' %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4 class="mb-0 fw-bold">ĐĂNG NHẬP</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% if form.errors %}
                    <div class="alert alert-danger d-flex align-items-center p-2 mb-3 shadow-sm" role="alert" style="border-radius: 8px; border-left: 4px solid #dc3545;">
                        <i class="bi bi-exclamation-triangle-fill fs-5 me-2 text-danger"></i>
                        <div class="small fw-semibold text-danger">
                            Tên đăng nhập hoặc mật khẩu không chính xác!
                        </div>
                    </div>
                    {% endif %}
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên đăng nhập</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mật khẩu</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <div class="text-end mb-3 mt-n2">
                        <a href="{% url 'forgot_password' %}" class="text-decoration-none text-primary small fw-bold">
                            Quên mật khẩu?
                        </a>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Đăng nhập ngay</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <small>Chưa có tài khoản? <a href="{% url 'register' %}" class="fw-bold text-danger">Đăng ký tại đây</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
