
{% extends 'app/base_auth.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <h3 class="text-primary text-center mb-4">Quên Mật Khẩu</h3>
    <div class="card shadow p-4">
        <!-- Bắt thông báo lỗi hoặc thành công từ views.py -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} d-flex align-items-center p-2 mb-3 shadow-sm" role="alert" style="border-radius: 8px; border-left: 4px solid {% if message.tags == 'error' %}#dc3545{% else %}#198754{% endif %};">

            {% if message.tags == 'error' %}
            <i class="bi bi-exclamation-triangle-fill fs-5 me-2 text-danger"></i>
            <div class="small fw-semibold text-danger">
                {{ message }}
            </div>
            {% else %}
            <i class="bi bi-check-circle-fill fs-5 me-2 text-success"></i>
            <div class="small fw-semibold text-success">
                {{ message }}
            </div>
            {% endif %}

        </div>
        {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Nhập Email đã đăng ký:</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Gửi mã OTP</button>
        </form>
    </div>
</div>
{% endblock %}
